version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: medpolicy_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medpolicy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medpolicy123}
      POSTGRES_DB: ${POSTGRES_DB:-medpolicydb}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/seed/health_card_mapping.sql:/docker-entrypoint-initdb.d/01_health_card_mapping.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medpolicy}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
